      <text x="352" y="621" fill="#334155" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700">Flujo de tareas</text>

      <rect x="536" y="588" width="214" height="54" rx="27" fill="url(#goldGrad)"/>
      <text x="568" y="621" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700">Resultados y logs</text>
    </g>
