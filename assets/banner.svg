<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bannerTitle bannerDesc">
  <title id="bannerTitle">Banner de ImageFlow Frontend</title>
  <desc id="bannerDesc">Hero visual en espanol para el README de ImageFlow Frontend.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1500" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F4EE"/>
      <stop offset="0.45" stop-color="#FBFCFE"/>
      <stop offset="1" stop-color="#EEF3F9"/>
    </linearGradient>
    <linearGradient id="inkPanel" x1="1060" y1="88" x2="1494" y2="614" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172554"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="240" y1="140" x2="540" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <filter id="softGlow" x="-240" y="-240" width="2100" height="1300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="40" fill="url(#bg)"/>
  <circle cx="1320" cy="168" r="150" fill="#FACC15" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="292" cy="600" r="124" fill="#EAB308" opacity="0.10" filter="url(#softGlow)"/>

  <g>
    <rect x="110" y="96" width="270" height="46" rx="23" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="146" cy="119" r="7" fill="#FACC15"/>
    <text x="166" y="126" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2">INTERFAZ DE OPERACION</text>

    <text x="110" y="214" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">Centro visual</text>
    <text x="110" y="292" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">para pipelines</text>
    <text x="110" y="370" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">de imagenes</text>
    <text x="110" y="448" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">distribuidas</text>

    <text x="114" y="510" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="24">
      Carga, configura y supervisa lotes desde una interfaz
    </text>
    <text x="114" y="544" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="24">
      pensada para operadores, resultados, nodos y trazabilidad.
    </text>

    <g>
      <rect x="110" y="588" width="196" height="54" rx="27" fill="#0F172A"/>
      <text x="144" y="621" fill="#FFFFFF" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700">8 nodos activos</text>

