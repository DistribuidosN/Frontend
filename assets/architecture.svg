<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">Arquitectura Screaming de ImageFlow Frontend</title>
  <desc id="archDesc">Diagrama visual de la arquitectura del frontend, organizado por features y capacidades del producto.</desc>
  <defs>
    <linearGradient id="archBg" x1="80" y1="80" x2="1520" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F4EE"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="archShadow" x="0" y="0" width="1600" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1600" height="1080" rx="36" fill="url(#archBg)"/>

  <text x="92" y="92" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">ARQUITECTURA</text>
  <text x="92" y="154" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">Como esta organizado</text>
  <text x="92" y="214" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">el frontend hoy</text>
  <text x="92" y="276" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="22">La estructura principal grita el dominio del producto:</text>
  <text x="92" y="306" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="22">features, shell, tema, widgets y capacidades como dashboard, carga, progreso y resultados.</text>

  <g filter="url(#archShadow)">
    <rect x="110" y="392" width="250" height="154" rx="26" fill="#FFFFFF"/>
    <text x="142" y="432" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">ENTRADA</text>
    <text x="142" y="480" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="30" font-weight="700">main.dart</text>
    <text x="142" y="514" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="17">Inicializa Flutter y monta</text>
    <text x="142" y="538" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="17">ImageFlowApp.</text>

    <rect x="420" y="362" width="760" height="214" rx="30" fill="#FFFFFF"/>
    <text x="456" y="404" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">SHELL Y NAVEGACION</text>
    <text x="456" y="456" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="36" font-weight="700">ImageFlowApp y shell responsive</text>
    <text x="456" y="494" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="18">Auth, sidebar, header, cambio de pantallas</text>
    <text x="456" y="520" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="18">y composicion principal de la experiencia.</text>

    <rect x="456" y="536" width="110" height="34" rx="17" fill="#0F172A"/>
    <text x="492" y="558" fill="#FFFFFF" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700">auth</text>
    <rect x="580" y="536" width="118" height="34" rx="17" fill="#FACC15"/>
    <text x="610" y="558" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700">shell</text>
    <rect x="712" y="536" width="140" height="34" rx="17" fill="#EEF2FF"/>
    <text x="744" y="558" fill="#1E3A8A" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700">navigation</text>
    <rect x="866" y="536" width="182" height="34" rx="17" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="902" y="558" fill="#334155" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700">layout responsive</text>

    <rect x="1230" y="392" width="260" height="154" rx="26" fill="#FFFFFF"/>
    <text x="1262" y="432" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">SISTEMA VISUAL</text>
    <text x="1262" y="480" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="30" font-weight="700">Tema y widgets</text>
    <text x="1262" y="514" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="17">core/theme y shared/widgets</text>
    <text x="1262" y="538" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="17">sostienen la UI comun.</text>

    <rect x="110" y="630" width="250" height="194" rx="26" fill="#FFFFFF"/>
    <text x="142" y="670" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">SOPORTE DE DATOS</text>
    <text x="142" y="718" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="30" font-weight="700">domain y data</text>
    <text x="142" y="752" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="17">Modelos, fuentes y estructuras</text>
    <text x="142" y="776" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="17">que acompañan cada feature.</text>

    <rect x="142" y="792" width="112" height="34" rx="17" fill="#EFF6FF"/>
    <text x="170" y="814" fill="#1D4ED8" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700">domain</text>
    <rect x="268" y="792" width="92" height="34" rx="17" fill="#F0FDF4"/>
    <text x="294" y="814" fill="#166534" font-family="Verdana, Arial, sans-serif" font-size="15" font-weight="700">data</text>

    <rect x="420" y="630" width="1070" height="300" rx="30" fill="#FFFFFF"/>
    <text x="456" y="672" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">ARQUITECTURA SCREAMING</text>
    <text x="456" y="720" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="40" font-weight="700">Las features gritan el dominio</text>
    <text x="456" y="756" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="18">La organizacion principal del repo parte de las capacidades del producto,</text>
    <text x="456" y="782" fill="#475569" font-family="Verdana, Arial, sans-serif" font-size="18">no de una separacion tecnica generica como primer mensaje visual.</text>

    <rect x="456" y="812" width="300" height="88" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="484" y="842" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.4">OPERACION</text>
    <text x="484" y="874" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">dashboard  upload</text>
    <text x="484" y="900" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">task_builder  progress  results</text>

    <rect x="805" y="812" width="300" height="88" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="833" y="842" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.4">TRAZABILIDAD</text>
    <text x="833" y="874" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">history  request_detail</text>
    <text x="833" y="900" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">nodes  logs</text>

    <rect x="1154" y="812" width="300" height="88" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="1182" y="842" fill="#64748B" font-family="Verdana, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.4">ACCESO Y SHELL</text>
    <text x="1182" y="874" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">auth  shell</text>
    <text x="1182" y="900" fill="#0F172A" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">settings</text>
  </g>

  <path d="M360 469H420" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1230 469H1180" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M800 576V630" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M360 727H420" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
